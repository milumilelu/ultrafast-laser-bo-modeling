skills:
  - name: task_understanding
    version: 2.0.0
    description: 渐进理解用户任务，规范术语、单位、材料、几何、目标与约束，并维护开放式 Working Context。
    when_to_use: [新任务、自然语言补充、字段纠正、附件带来新任务事实]
    guidance:
      - 只提交用户明确给出或可靠解析出的事实，不猜测材料牌号、几何或设备参数。
      - Working Context 可渐进补充；仅当关键歧义改变路线或工具输入时追问。
      - 几何统一写入 geometry.feature_type、dimensions 和自由描述，不新增场景级顶层字段。
    recommended_tools: [get_equipment_context]

  - name: evidence_research
    version: 2.0.0
    description: 检索已审核内部知识，并在明确授权后将外部证据转为待审核知识候选。
    when_to_use: [需要文献证据、历史经验、证据缺口、外部知识冷启动]
    guidance:
      - 区分内部已审核证据与外部候选；未审核候选不得进入正式 RAG 或 BO。
      - 检索结果必须保留来源、适用范围与不确定性。
      - 外部知识引入需要用户授权，正式采用需要专家审核。
    recommended_tools: [search_knowledge]

  - name: process_planning
    version: 2.0.0
    description: 基于任务、设备边界和证据组合工艺路线、质量计划、测量计划与试验策略。
    when_to_use: [制定工艺方案、评估风险、选择试验层级、生成执行计划]
    guidance:
      - 先读取设备边界；区分硬约束、质量约束和可优化变量。
      - 路线是建议，不得伪装成已验证工艺。
      - 是否试验由证据和风险决定，不由固定状态机强制决定。
    recommended_tools: [get_equipment_context, search_knowledge, recommend_parameters_rag, manage_trial, manage_process]

  - name: parameter_recommendation
    version: 2.0.0
    description: 根据数据支持度选择 BO、RAG 或探索性参数来源，并说明边界、证据与适用权限。
    when_to_use: [推荐加工参数、评估 BO 就绪度、需要保守初始参数]
    guidance:
      - 有合格上下文匹配数据时优先 BO；否则使用已审核 RAG；再否则仅给探索性参数。
      - 所有候选必须满足权威设备边界，且明确参数来源与 intended use。
      - 不得把探索性建议表述为最优参数或正式工艺。
    recommended_tools: [get_equipment_context, recommend_parameters_bo, recommend_parameters_rag, propose_exploratory_parameters]

  - name: experiment_optimization
    version: 2.0.0
    description: 管理试验与 BO 迭代，摄取观测、更新模型、生成下一批候选并作继续/停止判断。
    when_to_use: [创建或推进试验、摄取观测、运行 BO 迭代、调整搜索空间]
    guidance:
      - 仅使用校验合格且与上下文匹配的观测更新模型。
      - 每轮记录候选、约束过滤、预算提示和停止理由；预算不强制终止任务。
      - 正式加工、危险动作和知识晋升仍需真实的安全或人工审批守卫。
    recommended_tools: [manage_trial, recommend_parameters_bo, recommend_parameters_rag, propose_exploratory_parameters, record_process_result, get_equipment_context]

  - name: result_learning
    version: 2.0.0
    description: 记录加工和测量结果，生成可审核知识候选与任务报告，不自动晋升知识。
    when_to_use: [提交试验或加工结果、沉淀经验、生成报告、审核知识候选]
    guidance:
      - 原始结果、质量判断、候选知识和已批准知识必须分层存储。
      - 创建知识候选不等于进入 RAG；必须保留证据与适用范围。
      - 报告只汇总可追溯事实，不补造缺失测量值。
    recommended_tools: [record_process_result, manage_trial, manage_process]
