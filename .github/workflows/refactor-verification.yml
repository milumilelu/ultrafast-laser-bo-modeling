name: Refactor verification

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ULTRAFAST_LLM_PROVIDER: mock
      ULTRAFAST_LLM_MODEL: deterministic-demo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            ultrafast_laser_memory/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e "./ultrafast_laser_memory[dev]"

      - name: Run complete test suite
        run: python -m pytest -q

      - name: Run deterministic offline demo replay
        shell: pwsh
        run: ./scripts/demo_replay.ps1
